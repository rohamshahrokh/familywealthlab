<!--
  Family Wealth Lab — favicon (32×32 simplified mark).

  Transparent background. Uses currentColor for the structural lines so the
  browser tab's surrounding theme can tint it; tab UI defaults render this
  as the dark ink color, which is correct on light tab backgrounds.

  Designed at 32×32 viewBox for maximum sharpness at 16px, 32px, 48px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Circle frame -->
  <circle cx="16" cy="16" r="13" stroke="#0B0F1A" stroke-width="1.75" fill="none"/>
  <!-- Trunk -->
  <rect x="15" y="17" width="2" height="9" rx="0.4" fill="#0B0F1A"/>
  <!-- Canopy silhouette -->
  <ellipse cx="16" cy="12" rx="7" ry="7" fill="#0B0F1A"/>
  <!-- Amber crown -->
  <ellipse cx="16" cy="10" rx="3" ry="2.6" fill="#C5841A"/>
</svg>
