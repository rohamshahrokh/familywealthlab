# Netlify configuration for Family Wealth Lab — commercial landing page
# Next.js 14 App Router deployed via the official Netlify Next.js Runtime.
#
# IMPORTANT — Netlify dashboard settings must match this file:
#   Build command:        npm run build
#   Publish directory:    .next        (set by the runtime; do NOT override to "out" or "dist")
#   Functions directory:  (leave blank — runtime manages it)
#
# The @netlify/plugin-nextjs plugin transforms Next.js routes into Netlify
# serverless/edge functions automatically. Without it, Netlify serves `.next/`
# as static files, which is why the previous deploy returned 404 on `/`
# (Next stores compiled HTML/JS inside `.next/server/` and `.next/static/`,
# not as a flat static bundle).
#
# ──────────────────────────────────────────────────────────────────────
# Required environment variables (set in Netlify dashboard → Site
# settings → Environment variables — NOT in this file, to keep secrets
# out of source control):
#
#   NEXT_PUBLIC_SUPABASE_URL        — Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY   — Supabase anon (publishable) key
#   SUPABASE_SERVICE_ROLE_KEY       — Supabase service-role key (server)
#   NEXT_PUBLIC_SITE_URL            — public site URL (OAuth / email links)
#   NEXT_PUBLIC_MFA_REQUIRED        — "true" to enforce step-up auth
#
# Names only here; see README "Environment variables" section and
# .env.example for the canonical list. If NEXT_PUBLIC_SUPABASE_URL
# points at a dead project, the client emits ~13 × 404 per page load,
# which polluted earlier Lighthouse runs.
# ──────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  # Reduce noisy Next telemetry on CI
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers — applied to every response.
# UI/design is untouched; these headers only affect transport-layer behaviour.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache immutable Next.js static assets (hashed filenames)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
