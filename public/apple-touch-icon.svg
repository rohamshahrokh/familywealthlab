<!--
  Apple touch icon — 192×192 maskable variant.

  Apple's touch-icon system clips to a squircle and does NOT honour
  transparent backgrounds gracefully (renders black behind). For this one
  surface only, we ship a soft paper background with the mark composed on
  top. Padding is generous (40px inset) so the mark survives the squircle
  mask without clipping at the corners.

  Wordmark omitted on purpose — Apple home-screen icons read best as
  a single emblematic mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- Paper background (Apple squircle will round the corners) -->
  <rect width="192" height="192" fill="#F4F5F7"/>

  <!-- Mark scaled and centred (mark canvas is 64×64, scale 2x, offset +32,+32) -->
  <g transform="translate(32 32) scale(2)">
    <!-- Circle frame -->
    <circle cx="32" cy="32" r="24" stroke="#0B0F1A" stroke-width="1.75" fill="none"/>
    <!-- Roots -->
    <path d="M 26 49 Q 30 48 31.5 46" stroke="#0B0F1A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 38 49 Q 34 48 32.5 46" stroke="#0B0F1A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Trunk -->
    <rect x="30.5" y="32" width="3" height="16" rx="0.6" fill="#0B0F1A"/>
    <!-- Canopy -->
    <ellipse cx="32" cy="16" rx="4" ry="5.5" fill="#C5841A"/>
    <ellipse cx="25" cy="20" rx="4" ry="5" fill="#0B0F1A" transform="rotate(-22 25 20)"/>
    <ellipse cx="39" cy="20" rx="4" ry="5" fill="#C5841A" transform="rotate(22 39 20)"/>
    <ellipse cx="23" cy="27" rx="4.5" ry="5" fill="#0B0F1A" transform="rotate(-30 23 27)"/>
    <ellipse cx="41" cy="27" rx="4.5" ry="5" fill="#0B0F1A" transform="rotate(30 41 27)"/>
    <ellipse cx="32" cy="24" rx="5" ry="6" fill="#0B0F1A"/>
  </g>
</svg>
